# KAI Scheduler documentation website (Hugo + Docsy).
# The docs content lives in the repo-root ../docs directory and is mounted into
# this site via module mounts below, so the same Markdown renders on GitHub and
# on the website. baseURL is overridden in CI to match the deploying repo.

baseURL = "https://gshaibi.github.io/KAI-Scheduler/"
title = "KAI Scheduler"

enableRobotsTXT = true
enableGitInfo = true

# Single language served at the site root (no /en/ subdir).
defaultContentLanguage = "en"

# Allow raw HTML in Markdown (docs use <picture>/<img>/<div> blocks).
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "tango"
    lineNumbersInTable = false

[module]
  proxy = "direct"
  [module.hugoVersion]
    extended = true
    min = "0.110.0"
  [[module.imports]]
    path = "github.com/google/docsy"
  [[module.imports]]
    path = "github.com/google/docsy/dependencies"
  # Homepage / site-owned content
  [[module.mounts]]
    source = "content"
    target = "content"
  # Shared docs content from the repo root
  [[module.mounts]]
    source = "../docs"
    target = "content/docs"
    excludeFiles = ["scale-tests/**"]
  # Logos and shared media referenced by pages
  [[module.mounts]]
    source = "../docs/assets"
    target = "static/assets"
  [[module.mounts]]
    source = "static"
    target = "static"

[menu]
  [[menu.main]]
    name = "Documentation"
    weight = 20
    url = "/docs/"
  [[menu.main]]
    name = "GitHub"
    weight = 50
    url = "https://github.com/gshaibi/KAI-Scheduler"
    pre = "<i class='fab fa-github'></i>"

[params]
  copyright = "The KAI Scheduler Authors"
  description = "A Kubernetes scheduler optimized for GPU resource allocation in AI/ML workloads."
  # "Edit this page" links are disabled: docs content is mounted from ../docs,
  # so Docsy cannot compute a correct source path. The navbar GitHub link
  # (menu.main) provides the repo entry point instead.
  offlineSearch = true
  prism_syntax_highlighting = false

  [params.ui]
    breadcrumb_disable = false
    navbar_logo = false
    sidebar_menu_compact = true
    sidebar_search_disable = false
    ul_show = 1
    footer_about_enable = true

  [params.links]
    [[params.links.user]]
      name = "GitHub"
      url = "https://github.com/gshaibi/KAI-Scheduler"
      icon = "fab fa-github"
      desc = "Development takes place here!"
    [[params.links.developer]]
      name = "GitHub"
      url = "https://github.com/gshaibi/KAI-Scheduler"
      icon = "fab fa-github"
      desc = "Development takes place here!"
